<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Hours Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --success: #059669;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .navbar {
            background: var(--card-bg) !important;
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        #port-badge {
            background: var(--background) !important;
            color: var(--text-secondary) !important;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid var(--border);
        }

        .container {
            max-width: 1200px;
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .card-body {
            padding: 2.5rem;
        }

        #auth-section {
            padding: 3rem 2rem;
        }

        #authorize-button {
            background: var(--primary);
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        #authorize-button:hover {
            background: var(--primary-hover);
        }

        #authorize-button i {
            font-size: 1.25rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-select, .form-control {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.625rem 0.875rem;
            font-size: 0.9375rem;
            color: var(--text-primary);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-select:focus, .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 500;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            font-size: 0.9375rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary i {
            margin-right: 0.375rem;
        }

        .stat-card {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
        }

        .stat-card .card-body {
            padding: 2rem;
        }

        .stat-card .card-title {
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .display-6 {
            font-size: 2.25rem;
            font-weight: 600;
            margin: 0;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .chart-card .card-body {
            padding: 2rem;
        }

        .chart-card .card-title {
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        .breakdown-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .breakdown-card .card-body {
            padding: 2rem;
        }

        .breakdown-card .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        h4 {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: var(--background);
            color: var(--text-secondary);
            border: none;
            font-weight: 500;
            padding: 0.875rem 1rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .table tbody tr {
            transition: background-color 0.15s ease;
        }

        .table tbody tr:hover {
            background-color: var(--background);
        }

        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem;
            }

            #auth-section {
                padding: 2rem 1rem;
            }

            .stat-card .display-6 {
                font-size: 1.875rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#"><i class='bx bx-time-five'></i> WorkyFinder</a>
            <div class="ms-auto">
                <div id="port-badge" class="badge">
                    Port: <span id="live-port">8080</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card main-card">
                    <div class="card-body">
                        <div id="auth-section" class="text-center">
                            <button id="authorize-button" class="btn btn-primary btn-lg" onclick="handleAuthClick()">
                                <i class='bx bxl-google'></i> Sign In with Google
                            </button>
                        </div>

                        <div id="calendar-section" class="row g-4" style="display: none;">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Select Calendar</label>
                                    <select id="calendar-select" class="form-select">
                                        <option value="">Choose a calendar</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">Select Month</label>
                                    <input type="month" id="month-picker" class="form-control">
                                </div>
                            </div>
                            <div class="col-12 text-center">
                                <button onclick="calculateHours()" class="btn btn-primary">
                                    <i class='bx bx-calculator'></i> Calculate Hours
                                </button>
                            </div>
                        </div>

                        <div id="results-section" class="mt-5" style="display: none;">
                            <h4 class="text-center">Working Hours Summary</h4>
                            
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div class="card stat-card">
                                        <div class="card-body">
                                            <h5 class="card-title">Total Hours</h5>
                                            <div id="hours-result" class="display-6">0h 0m</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card chart-card">
                                        <div class="card-body">
                                            <h5 class="card-title">Daily Distribution</h5>
                                            <canvas id="hoursChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card breakdown-card mt-4">
                                <div class="card-body">
                                    <h5 class="card-title">Events Breakdown</h5>
                                    <div class="table-responsive">
                                        <table class="table" id="events-table">
                                            <thead>
                                                <tr>
                                                    <th>Date</th>
                                                    <th>Event</th>
                                                    <th>Duration</th>
                                                </tr>
                                            </thead>
                                            <tbody id="events-breakdown">
                                                <tr>
                                                    <td>2024-01-15</td>
                                                    <td>Project Meeting</td>
                                                    <td>2h 30m</td>
                                                </tr>
                                                <tr>
                                                    <td>2024-01-16</td>
                                                    <td>Development Work</td>
                                                    <td>5h 15m</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
