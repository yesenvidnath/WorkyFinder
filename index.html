<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Hours Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Working Hours Calculator</h1>
        <div id="auth-section">
            <button id="authorize-button" onclick="handleAuthClick()">Sign In with Google</button>
        </div>
        <div id="calendar-section" style="display: none;">
            <select id="calendar-select">
                <option value="">Select a Calendar</option>
            </select>
            <div class="month-selector">
                <input type="month" id="month-picker">
                <button onclick="calculateHours()">Calculate Hours</button>
            </div>
        </div>
        <div id="results-section" style="display: none;">
            <h2>Working Hours Summary</h2>
            <div id="hours-result"></div>
            <div id="events-breakdown"></div>
        </div>
    </div>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <meta name="google-signin-client_id" content="YOUR_CLIENT_ID.apps.googleusercontent.com">
    <meta name="google-signin-cookiepolicy" content="single_host_origin">
</body>
</html>
